    type: numeric
  MMSE:
    type: numeric
    scale: true
    inverse: true
  HDSR:
    type: numeric
    scale: true
    inverse: true
  #ADAS:
  #  type: numeric
  CDR: 
    type: numeric
  CDR_sum:
    type: numeric
  Moca-J:
    type: numeric
  
