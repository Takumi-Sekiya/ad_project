# 統一後のカラム名とデータ型の定義
final_columns:
  subject_id:
    type: string
  diagnosis:
    type: string
  gm_atrophy:
    type: numeric
    scale: true
    inverse: false
  severity:
    type: numeric
    scale: true
    inverse: false
